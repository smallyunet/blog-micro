<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="smallyu's microblog, synced from GitHub Issues.">
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f7f8fa">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#11151c">
    <title>smallyu's microblog</title>
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png">
    <link rel="shortcut icon" href="./favicon.ico">
    <link rel="manifest" href="./site.webmanifest">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="./">smallyu的微博</a>
      <nav class="nav" aria-label="Primary">
        <a href="https://smallyu.net/">博客</a>
      </nav>
    </header>

    <main class="micro-blog" id="app">
      <section class="toolbar" aria-label="Filter">
        <div class="tabs" id="year-tabs" role="tablist" aria-label="Years"></div>
      </section>

      <section class="status-line" aria-live="polite">
        <span id="status-text">Loading...</span>
        <span class="status-actions">
          <span class="total-meta">All <span id="total-count">-</span> posts</span>
        </span>
      </section>

      <ol class="timeline" id="timeline" aria-live="polite"></ol>
    </main>

    <template id="loading-template">
      <li class="loading">
        <span></span>
        <span></span>
      </li>
    </template>

    <script src="./assets/vendor/marked.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
